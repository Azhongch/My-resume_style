<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.name }} - 履歷</title>
    <style>
        /* 基礎樣式 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: 20px auto; background-color: #ffffff; padding: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 3px solid #007bff; margin-bottom: 30px; }
        .header h1 { color: #007bff; }
        .section { margin-bottom: 40px; padding: 15px; border-left: 5px solid #007bff; background-color: #e9f5ff; }
        .section h2 { color: #333; margin-top: 0; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .skill-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; }
        .skill-list li { background-color: #007bff; color: white; padding: 5px 10px; margin-right: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 0.9em; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #007bff; }
        
        /* 圖片大小設定 */
        .edu-logo { 
            width: 100px; 
            max-height: 100px; 
            object-fit: contain; 
        }

        /* 修正 NCYU 放大後的位置對齊 */
        .ncyu-special {
            transform: scale(1.4); 
            /* 關鍵：將縮放基準點設為右側，防止放大後向左偏移 */
            transform-origin: right center; 
            /* 額外補償：若視覺上仍微偏，可用 margin-right 微調 */
            margin-right: 5px; 
        }

        .company-logo { 
            width: 100px; 
            max-height: 80px; 
            object-fit: contain; 
        }

        /* 通用的左右對齊容器 */
        .flex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        /* Tab 切換邏輯 */
        .tab-radio { display: none; }
