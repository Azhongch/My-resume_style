<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.name }} - 履歷</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #007bff; padding-bottom: 20px; }
        .section { margin-top: 20px; padding: 15px; border-left: 5px solid #007bff; background: #e9f5ff; }
        h1 { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>{{ data.name }}</h1>
            <p>{{ data.title }}</p>
        </header>

        <section class="section">
            <h2>聯絡資訊</h2>
            <p>Email: {{ data.contact.email }}</p>
            <p>電話: {{ data.contact.phone }}</p>
            <p><a href="{{ data.contact.linkedin }}">LinkedIn 檔案</a></p>
        </section>

        <section class="section">
            <h2>學歷</h2>
            {% for edu in data.education %}
            <div>
                <h3>{{ edu.school }}</h3>
                <p>{{ edu.degree }} ({{ edu.period }})</p>
            </div>
            {% endfor %}
        </section>
    </div>
</body>
</html>
